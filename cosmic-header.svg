<svg viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- Background Gradient -->
<linearGradient id="bg" x1="0" x2="1">
  <stop offset="0%" stop-color="#000000"/>
  <stop offset="50%" stop-color="#0f0c29"/>
  <stop offset="100%" stop-color="#1a1333"/>
</linearGradient>

<!-- Planet Gradient -->
<radialGradient id="planetGrad" cx="30%" cy="25%">
  <stop offset="0%" stop-color="#ffffff"/>
  <stop offset="40%" stop-color="#d6a4ff"/>
  <stop offset="75%" stop-color="#c77dff"/>
  <stop offset="100%" stop-color="#5a189a"/>
</radialGradient>

<!-- Glow -->
<filter id="glow">
  <feGaussianBlur stdDeviation="10" result="blur"/>
  <feMerge>
    <feMergeNode in="blur"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

<!-- Orbit Path -->
<path id="orbitPath" d="M500,300 a300,90 0 1,0 600,0 a300,90 0 1,0 -600,0" fill="none"/>

</defs>

<!-- Background -->
<rect width="1600" height="500" fill="url(#bg)"/>

<!-- Nebula Glow -->
<circle cx="1200" cy="200" r="400" fill="#7b2cbf" opacity="0.08"/>
<circle cx="400" cy="350" r="350" fill="#9d4edd" opacity="0.05"/>

<!-- Stars -->
<g fill="white">
  <circle cx="200" cy="80" r="2">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="120" r="2">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1300" cy="60" r="2">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="5s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- Shooting Stars -->
<g stroke="white" stroke-width="2">
  <line x1="-300" y1="100" x2="-100" y2="50">
    <animateTransform attributeName="transform"
      type="translate"
      from="0 0"
      to="2000 -80"
      dur="6s"
      repeatCount="indefinite"/>
  </line>
  <line x1="-400" y1="250" x2="-150" y2="180">
    <animateTransform attributeName="transform"
      type="translate"
      from="0 0"
      to="2200 -120"
      dur="9s"
      begin="2s"
      repeatCount="indefinite"/>
  </line>
</g>

<!-- Orbit -->
<ellipse cx="800" cy="300" rx="350" ry="110"
         fill="none"
         stroke="rgba(199,125,255,0.15)"/>

<!-- Satellite -->
<circle r="7" fill="#ffffff" filter="url(#glow)">
  <animateMotion dur="10s" repeatCount="indefinite">
    <mpath href="#orbitPath"/>
  </animateMotion>
</circle>

<!-- Planet -->
<g transform="translate(1150,280)">
  <circle r="100" fill="url(#planetGrad)" filter="url(#glow)"/>
  <ellipse rx="180" ry="45"
           fill="none"
           stroke="#c77dff"
           stroke-width="4"
           opacity="0.6">
    <animateTransform attributeName="transform"
      type="rotate"
      from="0"
      to="360"
      dur="18s"
      repeatCount="indefinite"/>
  </ellipse>
</g>

<!-- Telemetry Overlay -->
<g font-family="monospace" font-size="14" fill="#c77dff">
  <text x="80" y="80">MISSION CONTROL</text>
  <rect x="80" y="95" width="200" height="6" fill="#7b2cbf">
    <animate attributeName="width" values="0;200" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="80" y="130">Orbit Stability: 99.98%</text>
  <text x="80" y="150">AI Core: ACTIVE</text>
</g>

<!-- Name -->
<text x="800" y="180"
      text-anchor="middle"
      font-size="72"
      font-weight="800"
      letter-spacing="12"
      fill="white"
      font-family="Arial, sans-serif">
  D I B Y X
</text>

<!-- Subtitle -->
<text x="800" y="220"
      text-anchor="middle"
      font-size="20"
      fill="#c77dff"
      font-family="monospace">
  Cosmic Code Architect • Intelligence Engineer
</text>

</svg>
