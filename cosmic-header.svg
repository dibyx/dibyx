<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 1600 520" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

  <!-- ===================== DEFINITIONS ===================== -->
  <defs>
    <!-- background -->
    <linearGradient id="bgGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#02010a"/>
      <stop offset="45%" stop-color="#0b0920"/>
      <stop offset="100%" stop-color="#16102a"/>
    </linearGradient>

    <!-- nebula: fractal noise -->
    <filter id="nebulaNoise" x="-50%" y="-50%" width="200%" height="200%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch" seed="12" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0.6 0 0 0 0.08
                0 0.2 0 0 0.02
                0 0 0.6 0 0.1
                0 0 0 1 0" result="cn"/>
      <feGaussianBlur in="cn" stdDeviation="30" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>

    <!-- planet shading -->
    <radialGradient id="planetCore" cx="28%" cy="22%">
      <stop offset="0%" stop-color="#fff6ff"/>
      <stop offset="30%" stop-color="#f7d6ff"/>
      <stop offset="70%" stop-color="#c77dff"/>
      <stop offset="100%" stop-color="#5a189a"/>
    </radialGradient>

    <!-- ring gradient -->
    <linearGradient id="ringGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffd7ff"/>
      <stop offset="100%" stop-color="#7b61ff"/>
    </linearGradient>

    <!-- satellite trail gradient -->
    <linearGradient id="trailGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#c77dff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7b61ff" stop-opacity="0"/>
    </linearGradient>

    <!-- soft glow filter -->
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- subtle vignette -->
    <radialGradient id="vignette" cx="50%" cy="40%">
      <stop offset="60%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>

    <!-- small star shape -->
    <g id="tinyStar">
      <circle r="1.4" fill="#fff"/>
    </g>

    <!-- orbit path for animateMotion (centered later) -->
    <path id="orbitPath" d="M420,280 a320,100 0 1,0 760,0 a320,100 0 1,0 -760,0" fill="none"/>

    <!-- dashed trail path for animated dash -->
    <path id="trailPathShape" d="M420,280 a320,100 0 1,0 760,0" fill="none"/>

    <!-- logo fill gradient -->
    <linearGradient id="logoFill" x1="0" x2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c77dff"/>
    </linearGradient>

  </defs>

  <!-- ===================== BACKGROUND + NEBULA ===================== -->
  <rect x="0" y="0" width="1600" height="520" fill="url(#bgGrad)"/>
  <!-- nebula overlay (filter adds animated look when used as external SVG) -->
  <rect x="0" y="0" width="1600" height="520" filter="url(#nebulaNoise)" opacity="0.22"/>

  <!-- vignette -->
  <rect x="0" y="0" width="1600" height="520" fill="url(#vignette)" opacity="0.45"/>

  <!-- ===================== STARS FIELD (twinkle) ===================== -->
  <g id="stars" fill="#fff" opacity="0.98">
    <use xlink:href="#tinyStar" x="90" y="66">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/>
    </use>
    <use xlink:href="#tinyStar" x="180" y="120">
      <animate attributeName="opacity" values="0.15;0.95;0.15" dur="4.8s" repeatCount="indefinite" begin="0.6s"/>
    </use>
    <use xlink:href="#tinyStar" x="320" y="40">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="5s" repeatCount="indefinite" begin="0.2s"/>
    </use>
    <use xlink:href="#tinyStar" x="470" y="140"/>
    <use xlink:href="#tinyStar" x="630" y="48"/>
    <use xlink:href="#tinyStar" x="840" y="86">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="3.4s" repeatCount="indefinite" begin="0.4s"/>
    </use>
    <use xlink:href="#tinyStar" x="1020" y="28"/>
    <use xlink:href="#tinyStar" x="1240" y="86"/>
    <use xlink:href="#tinyStar" x="1460" y="52"/>
  </g>

  <!-- ===================== SHOOTING STARS (multiple) ===================== -->
  <g id="shooters" stroke-linecap="round" stroke-width="2">
    <g stroke="url(#trailGrad)" opacity="0.95">
      <line x1="-420" y1="80" x2="-170" y2="24">
        <animateTransform attributeName="transform" type="translate" from="0 0" to="1900 -90" dur="5.6s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="0;1;0" dur="5.6s" repeatCount="indefinite"/>
      </line>
    </g>

    <g stroke="url(#trailGrad)" opacity="0.92">
      <line x1="-520" y1="190" x2="-250" y2="110">
        <animateTransform attributeName="transform" type="translate" from="0 0" to="2000 -140" dur="8.2s" begin="1.1s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="0;1;0" dur="8.2s" begin="1.1s" repeatCount="indefinite"/>
      </line>
    </g>

    <g stroke="url(#trailGrad)" opacity="0.9">
      <line x1="-620" y1="250" x2="-300" y2="150">
        <animateTransform attributeName="transform" type="translate" from="0 0" to="2100 -160" dur="10s" begin="2s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="0;1;0" dur="10s" begin="2s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>

  <!-- ===================== ORBIT PATH (visual faint) ===================== -->
  <ellipse cx="800" cy="280" rx="360" ry="112" fill="none" stroke="rgba(199,125,255,0.08)" stroke-width="1.2"/>

  <!-- ===================== PLANET (3D style) ===================== -->
  <g id="planet" transform="translate(1180,260)">
    <!-- ring (rotating for depth) -->
    <ellipse rx="180" ry="55" fill="none" stroke="url(#ringGrad)" stroke-width="5" opacity="0.95" transform="rotate(-28)">
      <animateTransform attributeName="transform" type="rotate" values="-28;22;-28" dur="14s" repeatCount="indefinite"/>
    </ellipse>

    <!-- sphere with layered shading -->
    <g>
      <circle r="110" fill="url(#planetCore)"/>
      <!-- rotating band to mimic atmosphere/clouds -->
      <ellipse rx="70" ry="42" fill="rgba(0,0,0,0.06)" transform="rotate(16)">
        <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="42s" repeatCount="indefinite"/>
      </ellipse>
      <!-- upper glossy highlight -->
      <ellipse cx="-36" cy="-36" rx="36" ry="20" fill="rgba(255,255,255,0.92)">
        <animate attributeName="opacity" values="0.85;0.6;0.85" dur="6.5s" repeatCount="indefinite"/>
      </ellipse>
    </g>
  </g>

  <!-- ===================== SATELLITE + TRAIL (follows orbitPath) ===================== -->
  <g id="satelliteSystem" transform="translate(800,280)">
    <!-- trail stroke along orbit shape (subtle moving dash) -->
    <path d="M-360,0 a360,112 0 1,0 720,0" fill="none" stroke="url(#trailGrad)" stroke-width="8" stroke-linecap="round" opacity="0.16" filter="url(#softGlow)">
      <animate attributeName="stroke-dasharray" from="0,2000" to="2000,0" dur="6s" repeatCount="indefinite"/>
    </path>

    <!-- satellite group that moves along the orbit -->
    <g id="satG">
      <g transform="translate(-320,0)">
        <rect x="-10" y="-8" width="20" height="16" rx="3" fill="#e9ddff" stroke="#b08cff" stroke-width="0.8" filter="url(#softGlow)"/>
        <rect x="-28" y="-3" width="12" height="6" rx="1" fill="#c77dff"/>
        <rect x="16" y="-3" width="12" height="6" rx="1" fill="#c77dff"/>
        <circle cx="0" cy="-10" r="2.6" fill="#fff"/>
      </g>
    </g>

    <!-- animateMotion to follow the same path defined in defs -->
    <animateMotion xlink:href="#satG" dur="9.4s" rotate="auto" repeatCount="indefinite">
      <mpath xlink:href="#orbitPath"/>
    </animateMotion>

    <!-- glowing beacon on satellite (positioned relative to satG) -->
    <!-- We'll add a small pulsing glow by binding it to sat position using a second animateMotion -->
    <g id="satBeacon">
      <circle r="3.2" fill="#9d4edd" opacity="0.95">
        <animate attributeName="r" values="2.6;4.6;2.6" dur="1.05s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;1;0.6" dur="1.05s" repeatCount="indefinite"/>
      </circle>
    </g>

    <animateMotion xlink:href="#satBeacon" dur="9.4s" rotate="auto" repeatCount="indefinite">
      <mpath xlink:href="#orbitPath"/>
    </animateMotion>

  </g>

  <!-- ===================== TELEMETRY HUD (glass cards + animated bars) ===================== -->
  <g id="telemetry" transform="translate(36,36)" font-family="ui-monospace, Menlo, 'Roboto Mono', monospace">
    <!-- glass panel -->
    <rect x="0" y="0" rx="12" ry="12" width="420" height="156" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)"/>

    <!-- header -->
    <text x="20" y="26" fill="#cfcff8" font-size="12">MISSION CONTROL</text>

    <!-- progress bars (animated widths) -->
    <g transform="translate(20,44)" fill="#c8a8ff">
      <text x="0" y="0" font-size="11">Core AI</text>
      <rect x="0" y="8" width="300" height="8" rx="4" fill="rgba(255,255,255,0.03)"/>
      <rect x="0" y="8" width="210" height="8" rx="4" fill="#7b61ff">
        <animate attributeName="width" from="0" to="210" dur="1.2s" begin="0.4s" fill="freeze"/>
      </rect>

      <text x="0" y="34" font-size="11">Orbit Stability</text>
      <rect x="0" y="42" width="300" height="8" rx="4" fill="rgba(255,255,255,0.03)"/>
      <rect x="0" y="42" width="230" height="8" rx="4" fill="#9d4edd">
        <animate attributeName="width" from="0" to="230" dur="1.6s" begin="0.8s" fill="freeze"/>
      </rect>

      <text x="0" y="68" font-size="11">Services</text>
      <rect x="0" y="76" width="300" height="8" rx="4" fill="rgba(255,255,255,0.03)"/>
      <rect x="0" y="76" width="170" height="8" rx="4" fill="#c77dff">
        <animate attributeName="width" from="0" to="170" dur="1.4s" begin="1.2s" fill="freeze"/>
      </rect>
    </g>

    <!-- small radar widget -->
    <g transform="translate(350,16)">
      <circle cx="30" cy="62" r="34" fill="none" stroke="#7b61ff" stroke-opacity="0.12"/>
      <circle cx="30" cy="62" r="34" fill="none" stroke="#9d4edd" stroke-opacity="0.06" stroke-width="1"/>
      <path d="M30 62 L58 34 A34 34 0 0 1 58 90 z" fill="rgba(124,85,255,0.05)">
        <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 30 62" to="360 30 62" dur="6.2s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- ===================== VECTOR-OUTLINED LOGO (D I B Y X) ===================== -->
  <!-- Each letter is built from vector shapes so no fonts are required -->
  <g id="logo" transform="translate(400,110)" fill="url(#logoFill)" >
    <!-- D -->
    <path d="M0 0 L36 0 C58 0 76 18 76 40 C76 62 58 80 36 80 L0 80 Z M16 12 L36 12 C50 12 62 24 62 40 C62 56 50 68 36 68 L16 68 Z" />

    <!-- I (position: x ~ 100) -->
    <rect x="110" y="0" width="18" height="80" rx="3"/>

    <!-- B (position start x ~ 150) -->
    <path d="M180 0 L224 0 C246 0 262 16 262 36 C262 52 246 66 224 68 L180 68 Z M180 68 L224 68 C248 68 268 84 268 100 L180 100 Z" transform="translate(0,-10) scale(0.85,0.85)"/>

    <!-- Y (position start x ~ 260) -->
    <path d="M310 0 L340 0 L340 10 L320 40 L340 70 L340 80 L320 80 L300 45 L280 80 L260 80 L284 40 L264 10 L264 0 Z" transform="translate(-20,0) scale(0.95,0.95)"/>

    <!-- X (position start x ~ 380) -->
    <g transform="translate(410,0)">
      <rect x="-6" y="0" width="14" height="84" rx="3" transform="rotate(35)"/>
      <rect x="-6" y="0" width="14" height="84" rx="3" transform="rotate(-35)"/>
    </g>

    <!-- subtle float animation for logo -->
    <animateTransform attributeName="transform" type="translate" values="400,110;400,106;400,110" dur="4.5s" repeatCount="indefinite"/>
  </g>

  <!-- ===================== CENTRAL TITLE (redundant but left small for accessibility) ===================== -->
  <g transform="translate(800,92)">
    <text text-anchor="middle" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.02)">DIBYX • Cosmic Code Architect</text>
  </g>

  <!-- ===================== subtle watermark ===================== -->
  <text x="1580" y="510" font-size="9" text-anchor="end" fill="#ffffff" opacity="0.04" font-family="monospace">dibyx</text>

</svg>
